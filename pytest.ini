[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    --strict-markers
    --strict-config
    -v

[coverage:run]
source = hn
omit =
    */__main__.py

[coverage:report]
show_missing = true
skip_covered = false
sort = Cover
